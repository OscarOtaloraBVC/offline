apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg-operator
  namespace: devlake-cloudnative-pg
spec:
  interval: 5m
  releaseName: cloudnative-pg-operator
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.26.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg-repo
        namespace: flux-system
  values:
    replicaCount: 2
    