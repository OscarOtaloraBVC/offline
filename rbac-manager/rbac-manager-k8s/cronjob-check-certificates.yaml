# k8s/cronjob-send-alerts.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: send-certificate-alerts
  namespace: rbac-manager
spec:
  schedule: "0 * * * *"  # Cada hora
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: alert-sender
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c
            - curl -X POST http://rbac-manager-backend:8000/api/v1/alerts/send-notifications
          restartPolicy: OnFailure