apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  releaseName: vault
  interval: 5m
  chart:
    spec:
      chart: vault
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: vault-override-values
      valuesKey: override-values.yaml
  targetNamespace: vault