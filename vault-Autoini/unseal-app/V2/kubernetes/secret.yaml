apiVersion: v1
kind: Secret
metadata:
  name: vault-unseal-secrets
  namespace: vault
  labels:
    app: vault-unseal-backend
type: Opaque
data:
  # 🔐 JWT Secret - ¡CAMBIAR ESTE VALOR EN PRODUCCIÓN!
  # Generar con: echo -n "tu-clave-jwt-segura-sin-caracteres-especiales" | base64
  jwt-secret: bWktY2xhdmUtc2VndXJhLXNpbi1jYXJhY3RlcmVzLWVzcGVjaWFsZXM=
  
  # 👤 Admin credentials
  # Generar con: echo -n "admin" | base64
  admin-username: "YWRtaW4="
  
  # Generar con: echo -n "admin123" | base64
  admin-password: "YWRtaW4xMjM="
  
  # 🔑 Contraseña para el worker (opcional, se puede configurar desde la UI)
  # Si no se proporciona, el worker se configurará desde la base de datos
  # Generar con: echo -n "unseal-password-segura" | base64
  vault-unseal-password: YWRtaW4xMjM=