apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-init-config
  namespace: vault
data:
  config.yaml: |
    vault:
      addr: http://vault.vault.svc.cluster.local:8200
      authPath: kubernetes
      role: vault-init
      serviceAccountTokenPath: /var/run/secrets/kubernetes.io/serviceaccount/token
    
    kubernetes:
      authRole: vault-init
    
    unseal:
      threshold: 1
      shares: 1
    
    storage:
      type: postgresql
    
    tracing:
      enabled: false