# vault-init-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  template:
    metadata:
      labels:
        app: vault-init
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      containers:
      - name: vault-init
        image: hashicorp/vault:1.15.0
        command: ["/bin/sh"]
        args:
        - -c
        - |
          set -e
          echo "Waiting for Vault to be ready..."
          until curl -s http://vault.vault.svc.cluster.local:8200/v1/sys/health | grep -q '"initialized":'; do
            sleep 5
          done
          
          # Check if Vault is initialized
          STATUS=$(curl -s http://vault.vault.svc.cluster.local:8200/v1/sys/health | jq -r '.initialized')
          
          if [ "$STATUS" = "false" ]; then
            echo "Initializing Vault..."
            INIT_RESPONSE=$(curl -s -X PUT http://vault.vault.svc.cluster.local:8200/v1/sys/init -d '{
              "secret_shares": 1,
              "secret_threshold": 1
            }')
            
            KEYS=$(echo $INIT_RESPONSE | jq -r '.keys_base64[0]')
            ROOT_TOKEN=$(echo $INIT_RESPONSE | jq -r '.root_token')
            
            # Store keys in Kubernetes secret
            kubectl create secret generic vault-keys \
              --namespace vault \
              --from-literal=unseal-key="$KEYS" \
              --from-literal=root-token="$ROOT_TOKEN" \
              --dry-run=client -o yaml | kubectl apply -f -
            
            echo "Vault initialized successfully"
          else
            echo "Vault is already initialized"
          fi
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"