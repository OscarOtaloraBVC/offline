apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 5m
  chart:
    spec:
      chart: vault
      version: 0.25.0
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: flux-system
      interval: 1h

  values:
    global:
      enabled: true

    ui:
      enabled: true
      serviceType: LoadBalancer
      serviceNodePort: null
      externalPort: 8200

    injector:
      enabled: false

    server:
      ha:
        enabled: false

      service:
        enabled: true
        type: ClusterIP

      dataStorage:
        enabled: true
        size: 10Gi
        mountPath: /vault/data
        storageClass: ""

      # -------- Vault Configuration (manual init/unseal) ----------
      config: |
        ui = true

        listener "tcp" {
          address     = "0.0.0.0:8200"
          tls_disable = 1
        }

        storage "file" {
          path = "/vault/data"
        }

        telemetry {
          disable_hostname = true
          prometheus_retention_time = "12h"
        }

      serverTelemetry:
        prometheusOperator: true
