# vault-init-job-improved.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: vault-init
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-vault
        image: curlimages/curl:8.4.0
        command: ['sh', '-c', 'until curl -s http://vault.vault.svc.cluster.local:8200/v1/sys/health; do echo "Waiting for Vault..."; sleep 5; done']
      containers:
      - name: vault-init
        image: hashicorp/vault:1.15.0
        command: ["/bin/sh"]
        args:
        - -c
        - |
          apk add --no-cache jq
          /scripts/init-vault.sh
        volumeMounts:
        - name: init-script
          mountPath: /scripts
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: init-script
        configMap:
          name: vault-init-script
          defaultMode: 0755