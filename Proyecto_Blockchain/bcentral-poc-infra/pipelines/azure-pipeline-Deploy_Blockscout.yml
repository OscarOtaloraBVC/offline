#Limita la ejecución, Solo se ejecuta el pipeline relacionado con las ramas y los archivos modificados (Rama: main path: infra/**).
#trigger:
#  branches:
#    include:
#      - main
#  paths:
#    include:
#      - infra/**

#No se ejecuta automáticamente con el cambio de alguna rama
trigger: none

variables:
  # Grupo con credenciales / frontend
  - group: FRONTEND-GROUP

  # Variables de autenticación AKS
  - name: azureSubscription
    value: 'sc-nuam-dev-bcentral'
  - name: resourceGroup
    value: 'BCC-primary-Blockchain-group'
  - name: aksClusterName
    value: 'BCC-primary-aks-cluster'

  # Variables de despliegue Blockscout
  - group: blockscout-deploy-vars

pool:
  vmImage: ubuntu-latest

stages:
- stage: Despliegue_Blockscout
  displayName: Despliegue Blockscout
  jobs:
  - job: Deploy
    displayName: Despliegue Helm Blockscout Stack
    steps:

    # ---------------------------
    # Instalación de herramientas
    # ---------------------------
    - task: HelmInstaller@1
      displayName: Instalar Helm
      inputs:
        helmVersion: '3.14.0'

    - task: KubectlInstaller@0
      displayName: Instalar kubectl
      inputs:
        kubectlVersion: 'latest'

    # ---------------------------
    # Conexión al AKS
    # ---------------------------
    - task: Kubernetes@1
      displayName: Set AKS Context
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscriptionEndpoint: $(azureSubscription)
        azureResourceGroup: $(resourceGroup)
        kubernetesCluster: $(aksClusterName)
        command: 'login'

    # ---------------------------
    # Despliegue Blockscout
    # ---------------------------
    - bash: |
        set -e

        echo "📦 Generando SECRET_KEY_BASE"
        SECRET_KEY=$(openssl rand -base64 64 | tr -d '\n')

        echo "📂 Creando namespace $(AKS_NAMESPACE)"
        kubectl create namespace $(AKS_NAMESPACE) \
          --dry-run=client -o yaml | kubectl apply -f -

        echo "🔐 Creando Secret TLS personalizado"
        CERT_FILE="./utils/Despliegue-Blockscout/etablockscoutbc.labbcch.local.cer"
        KEY_FILE="./utils/Despliegue-Blockscout/etablockscoutbc.labbcch.local-orig.key"

        if [[ -f "$CERT_FILE" && -f "$KEY_FILE" ]]; then
          TLS_CRT=$(cat "$CERT_FILE" | base64 | tr -d '\n')
          TLS_KEY=$(cat "$KEY_FILE" | base64 | tr -d '\n')

          cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: blockscout-custom-tls
          namespace: $(AKS_NAMESPACE)
        type: kubernetes.io/tls
        data:
          tls.crt: $TLS_CRT
          tls.key: $TLS_KEY
        EOF
          echo "✅ Secret TLS creado correctamente"
        else
          echo "❌ No se encontraron los certificados TLS"
          exit 1
        fi

        echo "📝 Generando values.yaml equivalente al script"
        cat <<EOF > values.yaml
        config:
          network:
            id: "1337"
            name: "B-Central Testnet"
            currency:
              name: "B-Central"
              symbol: "BCEN"
              decimals: "18"
          prometheus:
            enabled: false
          testnet: true
          account:
            enabled: false
          nameService:
            enabled: false
          redirect:
            enabled: false
        blockscout:
          enabled: true
          replicaCount: 1
          image:
            repository: irinidregistry.azurecr.io/blockscout
            tag: "9.3.2"
            pullPolicy: Always
          env:
            DATABASE_URL: "postgresql://$(PG_USER):$(PG_PASSWORD)@postgresql-service.postgresql.svc.cluster.local:$(PG_PORT)/$(PG_DBNAME)"
            POOL_SIZE: "10"
            ETHEREUM_JSONRPC_VARIANT: "besu"
            ETHEREUM_JSONRPC_HTTP_URL: "http://besu-node-validator-1.bcentral-testnet.svc.cluster.local:8545"
            ETHEREUM_JSONRPC_WS_URL: "ws://besu-node-validator-1.bcentral-testnet.svc.cluster.local:8546"
            ECTO_USE_SSL: "false"
            SECRET_KEY_BASE: "$SECRET_KEY"
            MIX_ENV: "prod"
            DISABLE_EXCHANGE_RATES: "true"
            INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
        frontend:
          enabled: true
          replicaCount: 1
          image:
            repository: irinidregistry.azurecr.io/blockscout-frontend
            tag: "2.5.3"
            pullPolicy: Always
          env:
            NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: "wss"
            NEXT_PUBLIC_APP_HOST: "$(BLOCKSCOUT_HOST)"
            NEXT_PUBLIC_APP_PROTOCOL: "https"
            NEXT_PUBLIC_API_HOST: "$(BLOCKSCOUT_HOST)"
            NEXT_PUBLIC_API_PROTOCOL: "https"
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
        stats:
          enabled: false
        userOpsIndexer:
          enabled: false
        EOF

        echo "📦 Agregando repo Helm oficial"
        helm repo add blockscout https://blockscout.github.io/helm-charts
        helm repo update

        echo "🚀 Desplegando Helm Chart"
        helm upgrade --install $(RELEASE_NAME) blockscout/blockscout-stack \
          --namespace $(AKS_NAMESPACE) \
          --values values.yaml \
          --wait --timeout 10m

        echo "🌐 Creando Ingress"
        cat <<EOF | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: blockscout-ingress
          namespace: $(AKS_NAMESPACE)
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
        spec:
          ingressClassName: nginx
          tls:
          - hosts:
            - $(BLOCKSCOUT_HOST)
            secretName: blockscout-custom-tls
          rules:
          - host: $(BLOCKSCOUT_HOST)
            http:
              paths:
              - path: /api
                pathType: Prefix
                backend:
                  service:
                    name: explorer-blockscout-stack-blockscout-svc
                    port:
                      number: 80
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: explorer-blockscout-stack-frontend-svc
                    port:
                      number: 80
        EOF

        rm values.yaml
        echo ""
        echo "✅ Instalación completada"
        echo "🌐 Disponible en https://$(BLOCKSCOUT_HOST)"
      displayName: Desplegar Blockscout
