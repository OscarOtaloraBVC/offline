---
#helm install member-1 -f values/proxy-and-vault/txnode.yml -n supplychain-bes --set global.proxy.p2p=15015 besu-node 
#helm upgrade member-1 -f values/proxy-and-vault/txnode.yml -n supplychain-bes --set global.proxy.p2p=15015 besu-node
global:
  serviceAccountName: vault
  cluster:
    provider: azure
    cloudNativeServices: false
  vault:
    type: hashicorp
    network: besu
    address: http://vault.vault:8200
    authPath: bcentral
    secretEngine: secretsv2
    secretPrefix: "data/testnet"
    role: vault-role
  proxy:
    provider: ambassador
    externalUrlSuffix: test.yourdomain.com
    tmport: 443
    # Use internal addressing for P2P communication
    p2pProvider: internal
storage:
  size: "2Gi"
tessera:
  enabled: false #true
  tessera:
    port: 443
    resources:
      cpuLimit: 0.25
      cpuRequest: 0.05
      memLimit: "2G"
      memRequest: "1G"
    password: 'password'
  storage:
    enabled: false
    size: 1Gi
    dbSize: 2Gi
    allowedTopologies:
      enabled: false
  
tls:
  enabled: false #true
  settings:
    certSubject: CN=DLT Root CA,OU=DLT,O=DLT,L=London,C=GB
    tmTls: true

node:
  removeKeysOnDelete: false # this will erase keys - so be careful with this on validators
  isBootnode: false    # set this to true if this node is a bootnode
  usesBootnodes: false
  besu:
    envBesuOpts: ""  
    metrics:
      serviceMonitorEnabled: true
    resources:
      cpuLimit: 0.25
      cpuRequest: 0.05
      memLimit: "1G"
      memRequest: "300M"
    account:
      password: 'password'
    p2p:
      discovery: false
image:
  besu:
    repository: hyperledger/besu
    tag: 23.10.2
