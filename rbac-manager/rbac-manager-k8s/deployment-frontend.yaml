apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-manager-frontend
  namespace: rbac-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rbac-frontend
  template:
    metadata:
      labels:
        app: rbac-frontend
    spec:

      # imagePullSecrets:
      # - name: harbor-credentials

      containers:
      - name: rbac-manager-frontend
        #image: registry.nuamexchange.com/transversal-nuam/rbac-manager-frontend:0.0.4-alpha.1
        image: rbac-registry:5000/rbac-front:5.0
        ports:
          - containerPort: 80
