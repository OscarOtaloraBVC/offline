apiVersion: v1
kind: Service
metadata:
  name: vault-ha
  namespace: vault
  labels:
    app: vault-ha
spec:
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
    component: server
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
  clusterIP: None  # Headless service para HA
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  selector:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
    component: server
  ports:
    - name: http
      port: 8200
      targetPort: 8200
  type: ClusterIP