apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-prometheus
  namespace: vault
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-prometheus-binding
  namespace: vault
subjects:
  - kind: ServiceAccount
    name: prometheus-kube-prometheus-prometheus
    namespace: monitoring
roleRef:
  kind: Role
  name: vault-prometheus
  apiGroup: rbac.authorization.k8s.io
