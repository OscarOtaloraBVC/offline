apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: cluster-external-store-vault
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "kv_Production"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          key: "token"
          namespace: "external-secrets"
